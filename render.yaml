services:
  - type: web
    name: grocery-compare
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEED_DEMO_DATA
        value: true
      - key: JWT_SECRET
        sync: false
      - key: KROGER_CLIENT_ID
        sync: false
      - key: KROGER_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: receipts
      - key: DB_PATH
        value: /tmp/grocery.db
      - key: CORS_ORIGIN
        sync: false
